<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  />

  <style>
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .main-page {
      background-color: #f2eae2;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .main-card {
      width: 600px;
      height: 450px;
      border-radius: 20px;
      background-color: white;
      display: flex;
      /* overflow: hidden; */
    }
    
    .left-card,
    .right-card {
      flex: 0 0 50%;
      /* min-width: 0; */
    }

    .left-card {
      background-image: url(bg-image.png);
    }

    .right-card {
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .right-card h1 {
      color: #6c7289;
      font-family: "Montserrat";
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 5px;
    }

    .right-card .subtitle {
      font-size: 32px;
      font-family: "Fraunces";
      font-weight: 700;
      line-height: 32px;
    }

    .right-card .body {
        font-size: 14px;
        font-family: "Montserrat";
        line-height: 23px;
        font-weight: 500;
        color: #6C7289;
        font-style: normal;
    }

    .right-card .price {
        display: flex;
        gap: 20px;
        align-items: center;
    }

    .price {
        font-family: "Fraunces";
        font-weight: 700;
    }

    .price .left {
        color: #3D8168;
        font-size: 32px;
    }

    .price .right {
        color: #6C7289;
        font-size: 13px;
        font-family: "Montserrat";
        font-weight: 500;
        text-decoration: line-through;
    }

    .nav-btn {
        gap: 20px;
        width: 236px;
        height: 48px;
        display: flex;
        cursor: pointer;
        justify-content: center;
        align-items: center;
        font-family: "Montserrat";
        font-weight: 700;
        font-size: 14px;
        color: white;
        border-radius: 10px;
        border: none;
        background-color: #3D8168;
    }

    .nav-btn:active {
        background-color: #1A4032;
        transform: scale(0.98);
    }
  </style>
  <body>
    <div class="main-page">
      <div class="main-card">
        <div class="left-card"></div>
        <div class="right-card">
          <h1>PERFUME</h1>
          <p class="subtitle">Gabrielle Essence Eau De Parfum</p>
          <p class="body">
            A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for House of CHANEL.
          </p>
          <div class="price">
            <div class="left">$149.99</div>
            <div class="right">$169.99</div>
          </div>
          <button class="nav-btn">
            <img src="Cart.png" alt="">
            <span>Add to Cart</span>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
