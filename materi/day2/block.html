<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container {
        border: 1px solid black;
        margin-bottom: 10px;
        padding: 10px;
    }

    .container h1 {
        border: 1px solid red;
    }

    .container p {
        border: 1px solid aquamarine;
    }
</style>
<body>
    <div class="container">
        <div>these are display block tags</div>
        <h1>Heading</h1>
        <p>Paragraph</p>
    </div>
    <div class="container">
        <div>these are display inline tags</div>
        <input type="text">
        <input type="text">
        <input type="text">
        <span>Span</span>
    </div>
</body>
</html>
