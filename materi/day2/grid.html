<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .container {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
    }

    .container div {
        border: 1px solid black;
        height: 300px;
        padding: 10px;
    }
    @media (min-width: 0px) and (min-width: 480px) {
        .container {
            display: grid;
        grid-template-columns: 1fr
            
        }
    }

    @media (min-width: 481px) and (min-width: 768px) {
        .container {
            display: grid;
        grid-template-columns: 1fr 1fr 1fr;
            
        }
    }
</style>
<body>
    <div class="container">
        <div>kotak 1</div>
        <div>kotak 2</div>
        <div>kotak 3</div>
        <div>kotak 4</div>
        <div>kotak 5</div>
    </div>
</body>
</html>
