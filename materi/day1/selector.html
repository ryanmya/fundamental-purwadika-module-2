<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    /* universal selector */
    * {
        margin: 0;
        padding: 0;
    }

    /* element selector */
    h1 {
        font-size: 100px;
    }

    /* id selector */

    #selector {
        color: slateblue;
        font-size: 10px;
    }

    /* class selector */

    .mobilio {
        color: silver;
    }

    .black-beauty {
        color: black;
    }

    .vario {
        color: blue;
    }


</style>
<body>
    <p id="selector">Selector</p>
    <h1>This is a title</h1>

    <p class="mobilio">Mobilio</p>
    <p class="black-beauty">Black Beauty</p>
    <p class="vario">Vario</p>
</body>
</html>
